spring.application.name=ventas-api
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# =========================================================
# Datasource - MySQL (variables inyectadas por Docker / EC2)
# =========================================================
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT:localhost}:${DB_PORT:3306}/${DB_NAME:innovatech}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hikari: tolerante a base de datos que aun no esta lista al arrancar
spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =========================================================
# Swagger / OpenAPI
# =========================================================
springdoc.swagger-ui.path=/swagger-ui.html

# =========================================================
# Actuator - solo /health expuesto, suficiente para Docker HEALTHCHECK
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
