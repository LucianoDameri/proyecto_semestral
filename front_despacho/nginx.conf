# =========================================================
# Nginx config - Frontend SPA + reverse proxy a microservicios
# Innovatech Chile - ISY1101 EP2
# =========================================================
# Este archivo es un TEMPLATE: el entrypoint de nginx-unprivileged
# corre envsubst sobre /etc/nginx/templates/*.template al iniciar
# el contenedor y deja el resultado en /etc/nginx/conf.d/.
#
# Variables esperadas en el entorno (Docker / compose / docker run):
#   VENTAS_HOST     ej: "ventas:8080"      (compose)
#                       "10.0.2.5:8080"    (EC2, IP privada del backend)
#   DESPACHOS_HOST  ej: "despachos:8081"   (compose)
#                       "10.0.2.5:8081"    (EC2, mismo backend, otro puerto)
#
# Variables nginx ($host, $remote_addr, etc) NO se substituyen porque
# el entrypoint solo procesa las variables que existen en el ambiente.
# =========================================================

server {
    listen      8080;
    server_name _;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ---- SPA: archivos estaticos ----
    root  /usr/share/nginx/html;
    index index.html;

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Healthcheck local ----
    location = /healthz {
        access_log off;
        return    200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Proxy: microservicio Ventas ----
    location /api/v1/ventas {
        proxy_pass         http://${VENTAS_HOST};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ---- Proxy: microservicio Despachos ----
    location /api/v1/despachos {
        proxy_pass         http://${DESPACHOS_HOST};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
