name: CI/CD MySQL (bootstrap)

# =========================================================
# Workflow manual para arrancar / actualizar el contenedor
# MySQL en la EC2 DB. Solo se dispara manualmente o cuando
# se cambia el script.
# Usa volumen 'innovatech_mysql_data' para persistir datos.
# =========================================================

on:
  workflow_dispatch:
    inputs:
      mysql_tag:
        description: "Tag de la imagen mysql (ej: 8.0, 8.0.40)"
        required: true
        default: "8.0"

env:
  AWS_REGION: us-east-1
  CONTAINER_NAME: innovatech-mysql
  VOLUME_NAME: innovatech_mysql_data

jobs:
  deploy-mysql:
    name: Levantar MySQL en EC2 DB
    runs-on: ubuntu-latest

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy MySQL via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_DATABASE_ID }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_TAG:   ${{ inputs.mysql_tag }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Bootstrap MySQL $MYSQL_TAG" \
            --parameters commands="[
              \"set -e\",
              \"docker volume create $VOLUME_NAME || true\",
              \"docker stop $CONTAINER_NAME || true\",
              \"docker rm   $CONTAINER_NAME || true\",
              \"docker pull mysql:$MYSQL_TAG\",
              \"docker run -d --name $CONTAINER_NAME --restart unless-stopped \
                -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
                -e MYSQL_DATABASE=$DB_NAME \
                -p 3306:3306 \
                -v $VOLUME_NAME:/var/lib/mysql \
                --log-opt max-size=10m --log-opt max-file=3 \
                mysql:$MYSQL_TAG --bind-address=0.0.0.0\"
            ]" \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $CMD_ID"

          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Estado: $STATUS"
            case "$STATUS" in
              Success)  exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
                exit 1 ;;
            esac
            sleep 10
          done
          exit 1
