name: CI/CD Frontend

# =========================================================
# Pipeline del FRONTEND (React + Nginx)
# =========================================================
# Build de la imagen, push a ECR, deploy en la EC2 publica.
# El contenedor recibe VENTAS_HOST y DESPACHOS_HOST apuntando
# a la IP privada de la EC2 Backend (resuelta dinamicamente).
# =========================================================

on:
  push:
    branches: [deploy]
    paths:
      - "front_despacho/**"
      - ".github/workflows/cicd-frontend.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: frontend
  CONTAINER_PORT: 8080
  HOST_PORT: 80
  BUILD_CONTEXT: ./front_despacho

jobs:
  build-push-deploy:
    name: Build, push y deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_FRONTEND }}
        run: |
          IMAGE_SHA=${ECR_REPO}:${GITHUB_SHA::7}
          IMAGE_LATEST=${ECR_REPO}:latest
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_URL="" \
            -t "$IMAGE_SHA" \
            -t "$IMAGE_LATEST" \
            "${{ env.BUILD_CONTEXT }}"
          echo "IMAGE_SHA=$IMAGE_SHA"     >> $GITHUB_ENV
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> $GITHUB_ENV

      - name: Push image to ECR
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Resolve backend private IP
        id: backend-ip
        run: |
          BACKEND_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_BACKEND_ID }}" \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text)
          echo "BACKEND_IP=$BACKEND_IP" >> $GITHUB_OUTPUT
          echo "Backend privado: $BACKEND_IP"

      - name: Deploy on EC2 (SSM)
        env:
          BACKEND_IP: ${{ steps.backend-ip.outputs.BACKEND_IP }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -e

          CMD=$(cat <<EOF
          set -eux
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | sudo docker login --username AWS --password-stdin ${ECR_REGISTRY}
          sudo docker pull ${IMAGE_LATEST}
          sudo docker stop ${{ env.SERVICE_NAME }} || true
          sudo docker rm ${{ env.SERVICE_NAME }} || true
          sudo docker run -d \
            --name ${{ env.SERVICE_NAME }} \
            --restart unless-stopped \
            -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
            -e VENTAS_HOST=${BACKEND_IP}:8080 \
            -e DESPACHOS_HOST=${BACKEND_IP}:8081 \
            ${IMAGE_LATEST}
          sudo docker image prune -f
          EOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_FRONTEND_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${SERVICE_NAME} ${GITHUB_SHA::7}" \
            --parameters commands="$CMD" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_FRONTEND_ID }}" || true

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_FRONTEND_ID }}" \
            --query '{Status:Status, StdOut:StandardOutputContent, StdErr:StandardErrorContent}' \
            --output json
